name: Keep alive
on:
  schedule:
    - cron: "0 6 15 * *"   # le 15 de chaque mois
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep alive $(date +'%Y-%m')"
          git push
